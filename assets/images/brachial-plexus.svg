<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="100%" style="max-width:720px; background:#fff; font-family:system-ui,sans-serif;">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #475569; stroke-width: 2; rx: 6px; }
      .lbl { font-size: 12px; fill: #1e293b; text-anchor: middle; dominant-baseline: middle; }
      .lblsm { font-size: 10px; fill: #64748b; text-anchor: middle; }
      .line { stroke: #64748b; stroke-width: 1.5; fill: none; }
      .branch { fill: #e0e7ff; stroke: #4f46e5; stroke-width: 1.5; rx: 4px; }
      .blbl { font-size: 11px; fill: #312e81; text-anchor: middle; dominant-baseline: middle; }
      .title { font-size: 15px; fill: #0f172a; font-weight: 700; text-anchor: middle; }
      .cord { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; rx: 4px; }
      .clbl { font-size: 10px; fill: #92400e; text-anchor: middle; }
    </style>
  </defs>
  <text x="360" y="22" class="title">The Brachial Plexus (C5–T1)</text>
  
  <!-- Roots -->
  <rect x="55" y="60" width="46" height="26" class="box"/><text x="78" y="73" class="lbl">C5</text>
  <rect x="115" y="60" width="46" height="26" class="box"/><text x="138" y="73" class="lbl">C6</text>
  <rect x="175" y="60" width="46" height="26" class="box"/><text x="198" y="73" class="lbl">C7</text>
  <rect x="235" y="60" width="46" height="26" class="box"/><text x="258" y="73" class="lbl">C8</text>
  <rect x="295" y="60" width="46" height="26" class="box"/><text x="318" y="73" class="lbl">T1</text>
  <text x="180" y="48" class="lblsm">Roots (5)</text>
  
  <!-- Lines roots to trunks -->
  <polyline points="78,86 78,105 90,105" class="line"/>
  <polyline points="138,86 138,105 150,105" class="line"/>
  <polyline points="198,86 198,105 195,105" class="line"/>
  <polyline points="258,86 258,105 270,105" class="line"/>
  <polyline points="318,86 318,105 345,105" class="line"/>
  
  <!-- Trunks -->
  <rect x="84" y="105" width="72" height="26" class="box"/><text x="120" y="118" class="lbl">Upper</text>
  <rect x="168" y="105" width="60" height="26" class="box"/><text x="198" y="118" class="lbl">Middle</text>
  <rect x="264" y="105" width="90" height="26" class="box"/><text x="309" y="118" class="lbl">Lower</text>
  <text x="200" y="146" class="lblsm">Trunks (3) — "Randy"</text>
  
  <!-- Lines to divisions -->
  <polyline points="120,131 120,160 100,160" class="line"/>
  <polyline points="120,131 120,160 140,160" class="line"/>
  <polyline points="198,131 198,160 190,160" class="line"/>
  <polyline points="198,131 198,160 210,160" class="line"/>
  <polyline points="270,131 270,160 250,160" class="line"/>
  <polyline points="345,131 345,160 330,160" class="line"/>
  
  <!-- Divisions -->
  <rect x="70" y="160" width="60" height="22" class="box"/><text x="100" y="171" class="lblsm">Anterior</text>
  <rect x="140" y="160" width="60" height="22" class="box"/><text x="170" y="171" class="lblsm">Posterior</text>
  <rect x="180" y="160" width="60" height="22" class="box"/><text x="210" y="171" class="lblsm">Anterior</text>
  <rect x="250" y="160" width="60" height="22" class="box"/><text x="280" y="171" class="lblsm">Posterior</text>
  <text x="215" y="197" class="lblsm">Divisions (6) — "Travis"</text>
  
  <!-- Lines to cords -->
  <polyline points="100,182 100,210 108,210" class="line"/>
  <polyline points="170,182 170,210 168,210 260,210 270,210" class="line"/>
  <polyline points="210,182 210,210 240,210" class="line"/>
  <polyline points="280,182 280,210 300,210" class="line"/>
  
  <!-- Cords -->
  <rect x="68" y="210" width="80" height="26" class="cord"/><text x="108" y="223" class="clbl">Lateral</text>
  <rect x="168" y="210" width="80" height="26" class="cord"/><text x="208" y="223" class="clbl">Posterior</text>
  <rect x="280" y="210" width="80" height="26" class="cord"/><text x="320" y="223" class="clbl">Medial</text>
  <text x="218" y="252" class="lblsm">Cords (3) — "Drinks"</text>
  
  <!-- Lines to terminal branches -->
  <polyline points="88,236 88,280 70,280" class="line"/>
  <polyline points="128,236 128,280 160,280" class="line"/>
  <polyline points="188,236 188,280 180,280" class="line"/>
  <polyline points="228,236 228,280 260,280" class="line"/>
  <polyline points="300,236 300,280 340,280" class="line"/>
  <polyline points="340,236 340,280 200,280" class="line"/>
  
  <!-- Terminal branches -->
  <rect x="28" y="280" width="85" height="26" class="branch"/><text x="70" y="293" class="blbl">Musculocut.</text>
  <rect x="140" y="280" width="70" height="26" class="branch"/><text x="175" y="293" class="blbl">Median</text>
  <rect x="165" y="280" width="65" height="26" class="branch"/><text x="197" y="293" class="blbl">Axillary</text>
  <rect x="250" y="280" width="70" height="26" class="branch"/><text x="285" y="293" class="blbl">Radial</text>
  <rect x="330" y="280" width="70" height="26" class="branch"/><text x="365" y="293" class="blbl">Ulnar</text>
  <text x="215" y="322" class="lblsm">Branches (5) — "Cold Beer"</text>
  
  <!-- Mnemonic -->
  <rect x="130" y="340" width="330" height="60" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1"/>
  <text x="295" y="360" class="blbl" font-size="13">Randy Travis Drinks Cold Beer</text>
  <text x="295" y="382" class="lblsm" font-size="11">Roots → Trunks → Divisions → Cords → Branches</text>
</svg>
