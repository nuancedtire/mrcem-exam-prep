<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="100%" style="max-width:800px; background:#fff; font-family:system-ui,sans-serif;">
  <defs>
    <style>
      .path-box { fill: #f8fafc; stroke: #475569; stroke-width: 1.5; rx: 6px; }
      .lbl { font-size: 10px; fill: #1e293b; text-anchor: middle; dominant-baseline: middle; }
      .title { font-size: 16px; fill: #0f172a; font-weight: 700; text-anchor: middle; }
      .sub { font-size: 11px; fill: #64748b; text-anchor: middle; }
      .arrow { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
      .arrow-thick { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arr-thick); }
      .highlight { fill: #fef3c7; stroke: #d97706; stroke-width: 1; rx: 4px; }
      .terminal { fill: #d1fae5; stroke: #059669; stroke-width: 1.5; rx: 6px; }
      .t-lbl { font-size: 10px; fill: #065f46; font-weight: 700; text-anchor: middle; }
    </style>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="#64748b"/></marker>
    <marker id="arr-thick" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 7 3, 0 6" fill="#475569"/></marker>
  </defs>
  
  <text x="400" y="24" class="title">The Complement System — Three Pathways, One Outcome</text>
  
  <!-- Classical Pathway -->
  <rect x="20" y="45" width="200" height="60" class="path-box"/>
  <text x="120" y="65" class="lbl" font-weight="700" fill="#1e3a5f">Classical Pathway</text>
  <text x="120" y="82" class="lbl">IgG/IgM + antigen → C1q,r,s</text>
  <text x="120" y="97" class="lbl">activates C4 → C2</text>
  <text x="20" y="120" class="sub">"Needs antibody"</text>
  
  <!-- Lectin Pathway -->
  <rect x="240" y="45" width="200" height="60" class="path-box"/>
  <text x="340" y="65" class="lbl" font-weight="700" fill="#1e3a5f">Lectin Pathway</text>
  <text x="340" y="82" class="lbl">MBL binds mannose on microbes</text>
  <text x="340" y="97" class="lbl">MASP-1, MASP-2 → C4 → C2</text>
  <text x="340" y="120" class="sub">"No antibody needed"</text>
  
  <!-- Alternative Pathway -->
  <rect x="460" y="45" width="200" height="60" class="path-box"/>
  <text x="560" y="65" class="lbl" font-weight="700" fill="#1e3a5f">Alternative Pathway</text>
  <text x="560" y="82" class="lbl">Spontaneous C3 hydrolysis (tickover)</text>
  <text x="560" y="97" class="lbl">C3b + Factor B + Factor D + Properdin</text>
  <text x="560" y="120" class="sub">"Amplification loop"</text>
  
  <!-- Arrows down to C3 convertase -->
  <polyline points="120,110 120,145 280,145 280,160" class="arrow"/>
  <polyline points="340,110 340,160" class="arrow"/>
  <polyline points="560,110 560,145 480,145 480,160" class="arrow"/>
  
  <!-- C3 Convertase -->
  <rect x="270" y="160" width="220" height="30" class="highlight"/>
  <text x="380" y="179" class="lbl" font-size="11" font-weight="700">⭐ C3 CONVERTASE ⭐</text>
  
  <!-- Arrow to C5 convertase -->
  <polyline points="380,190 380,220" class="arrow-thick"/>
  
  <!-- C5 Convertase -->
  <rect x="290" y="220" width="180" height="26" class="highlight"/>
  <text x="380" y="236" class="lbl" font-size="11" font-weight="700">C5 Convertase</text>
  
  <!-- Anaphylatoxins branch -->
  <polyline points="380,220 620,220 620,100 660,100" class="arrow"/>
  <rect x="660" y="88" width="120" height="26" fill="#fee2e2" rx="4" stroke="#dc2626" stroke-width="1"/>
  <text x="720" y="104" class="lbl" font-size="10" fill="#991b1b" font-weight="600">C3a, C4a, C5a</text>
  <text x="780" y="104" font-size="9" fill="#991b1b">Anaphylatoxins!</text>
  
  <!-- Opsonin branch -->
  <polyline points="270,175 170,175 170,100 120,100" class="arrow"/>
  <rect x="60" y="88" width="100" height="26" fill="#dbeafe" rx="4" stroke="#2563eb" stroke-width="1"/>
  <text x="110" y="104" class="lbl" font-size="10" fill="#1e40af" font-weight="600">C3b = Opsonin</text>
  
  <!-- C5a chemotaxis -->
  <polyline points="560,175 620,175 620,150 660,150" class="arrow"/>
  <rect x="660" y="138" width="120" height="26" fill="#e0e7ff" rx="4" stroke="#6366f1" stroke-width="1"/>
  <text x="720" y="154" class="lbl" font-size="10" fill="#3730a3" font-weight="600">C5a = Chemotaxis</text>
  
  <!-- Arrow to MAC -->
  <polyline points="380,246 380,275" class="arrow-thick"/>
  
  <!-- MAC -->
  <rect x="280" y="275" width="200" height="28" class="terminal"/>
  <text x="380" y="292" class="t-lbl" font-size="12">MAC: C5b–C6–C7–C8–C9(poly)</text>
  
  <!-- Effect -->
  <text x="380" y="320" class="lbl" font-size="11" font-weight="600" fill="#065f46">→ Pore formation in microbial membrane → LYSIS</text>
  
  <!-- Key at bottom -->
  <rect x="100" y="340" width="600" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="400" y="359" font-size="10" fill="#64748b" text-anchor="middle">💡 Memory: Classical needs Antibody — Alternative has Properdin — Lectin uses MBL. All converge at C3 convertase.</text>
</svg>
