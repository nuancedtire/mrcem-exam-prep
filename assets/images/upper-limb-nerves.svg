<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="100%" style="max-width:400px; background:#fff; font-family:system-ui,sans-serif;">
  <defs>
    <style>
      .title { font-size: 15px; fill: #0f172a; font-weight: 700; text-anchor: middle; }
      .lbl { font-size: 11px; fill: #1e293b; text-anchor: middle; dominant-baseline: middle; }
      .lbl-sm { font-size: 9px; fill: #64748b; text-anchor: middle; }
      .nerve-lbl { font-size: 10px; font-weight: 700; text-anchor: middle; }
    </style>
  </defs>
  
  <text x="200" y="20" class="title">Upper Limb Sensory Nerve Distribution</text>
  
  <!-- Left hand: PALMAR view -->
  <text x="100" y="44" class="lbl" font-weight="600">Palmar (Anterior)</text>
  <rect x="10" y="50" width="180" height="200" rx="8" fill="#fefce8" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Hand outline - simplified -->
  <ellipse cx="100" cy="150" rx="70" ry="80" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Thumb -->
  <ellipse cx="45" cy="180" rx="15" ry="30" transform="rotate(-30,45,180)" fill="none" stroke="#475569" stroke-width="1.5"/>
  <!-- Fingers -->
  <rect x="130" y="72" width="14" height="45" rx="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="148" y="68" width="14" height="50" rx="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="166" y="72" width="14" height="45" rx="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="184" y="78" width="14" height="38" rx="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  
  <!-- Median nerve territory (palmar) - yellow -->
  <polygon points="100,150 40,170 40,220 100,230 130,220 170,180 170,120 130,80" fill="#fef08a" opacity="0.5"/>
  <text x="100" y="250" class="nerve-lbl" fill="#a16207">Median (yellow)</text>
  <text x="100" y="263" class="lbl-sm" fill="#a16207">Thumb, index, middle, ½ ring</text>
  
  <!-- Right hand: DORSAL view -->
  <text x="300" y="44" class="lbl" font-weight="600">Dorsal (Posterior)</text>
  <rect x="210" y="50" width="180" height="200" rx="8" fill="#fefce8" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Hand outline simplified -->
  <ellipse cx="300" cy="150" rx="70" ry="80" fill="none" stroke="#475569" stroke-width="1.5"/>
  <ellipse cx="250" cy="180" rx="15" ry="30" transform="rotate(-30,250,180)" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="330" y="72" width="14" height="45" rx="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="348" y="68" width="14" height="50" rx="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="366" y="72" width="14" height="45" rx="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  <rect x="384" y="78" width="14" height="38" rx="7" fill="none" stroke="#475569" stroke-width="1.5"/>
  
  <!-- Radial nerve territory (dorsal) - red -->
  <polygon points="300,150 330,80 370,80 380,130 370,200 300,230 250,220 250,170" fill="#fca5a5" opacity="0.5"/>
  <text x="300" y="250" class="nerve-lbl" fill="#b91c1c">Radial (red)</text>
  <text x="300" y="263" class="lbl-sm" fill="#b91c1c">Dorsal hand, thumb web space</text>
  
  <!-- Ulnar nerve territory (both) - blue -->
  <!-- Palmar ulnar -->
  <polygon points="20,120 30,100 80,80 100,80 80,130 30,190" fill="#bfdbfe" opacity="0.4"/>
  <!-- Dorsal ulnar -->
  <polygon points="210,120 220,100 270,80 290,80 280,130 220,190" fill="#bfdbfe" opacity="0.4"/>
  <text x="100" y="295" class="nerve-lbl" fill="#1e40af">Ulnar (blue) — little finger, ½ ring (palmar &amp; dorsal)</text>
  
  <!-- Legend -->
  <rect x="10" y="320" width="380" height="150" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="200" y="345" font-size="12" font-weight="700" text-anchor="middle" fill="#0f172a">Nerve Lesion Quick Reference</text>
  
  <rect x="30" y="358" width="16" height="16" rx="2" fill="#ef4444"/><text x="55" y="370" font-size="10" fill="#1e293b">Radial = Wrist drop (Saturday night palsy, spiral groove fracture)</text>
  <rect x="30" y="382" width="16" height="16" rx="2" fill="#f59e0b"/><text x="55" y="394" font-size="10" fill="#1e293b">Median = Ape hand + loss of thenar (carpal tunnel, supracondylar #)</text>
  <rect x="30" y="406" width="16" height="16" rx="2" fill="#3b82f6"/><text x="55" y="418" font-size="10" fill="#1e293b">Ulnar = Claw hand + Froment's sign (medial epicondyle #, cubital tunnel)</text>
  <rect x="30" y="430" width="16" height="16" rx="2" fill="#8b5cf6"/><text x="55" y="442" font-size="10" fill="#1e293b">Axillary = Deltoid paralysis + regimental badge anaesthesia (# humeral neck)</text>
  <rect x="30" y="454" width="16" height="16" rx="2" fill="#10b981"/><text x="55" y="466" font-size="10" fill="#1e293b">Long thoracic = Winged scapula (mastectomy, serratus anterior palsy)</text>
</svg>
