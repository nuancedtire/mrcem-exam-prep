<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" width="100%" style="max-width:720px; background:#fff; font-family:system-ui,sans-serif;">
  <defs>
    <style>
      .box1 { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 8px; }
      .box2 { fill: #d1fae5; stroke: #059669; stroke-width: 2; rx: 8px; }
      .lbl { font-size: 12px; fill: #1e293b; text-anchor: middle; dominant-baseline: middle; }
      .title { font-size: 16px; fill: #0f172a; font-weight: 700; text-anchor: middle; }
      .hdr { font-size: 13px; font-weight: 700; text-anchor: middle; }
      .sub { font-size: 10px; fill: #64748b; text-anchor: middle; }
      .arrow { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
      .arrow-red { stroke: #dc2626; stroke-width: 2; marker-end: url(#arrowhead-red); fill: none; }
      .arrow-grn { stroke: #059669; stroke-width: 2; marker-end: url(#arrowhead-grn); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/></marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#dc2626"/></marker>
    <marker id="arrowhead-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#059669"/></marker>
  </defs>
  
  <text x="360" y="24" class="title">Necrosis vs Apoptosis</text>
  
  <!-- Left: NECROSIS -->
  <rect x="20" y="40" width="330" height="280" class="box1"/>
  <text x="185" y="70" class="hdr" fill="#dc2626">NECROSIS (Pathological)</text>
  
  <!-- Necrosis cell -->
  <circle cx="185" cy="130" r="35" fill="#fca5a5" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="185" y="127" class="lbl" font-size="11" fill="#991b1b">Swollen</text>
  <text x="185" y="143" class="lbl" font-size="11" fill="#991b1b">cell</text>
  
  <!-- Leaking arrows -->
  <line x1="220" y1="110" x2="260" y2="90" class="arrow-red"/>
  <line x1="220" y1="150" x2="265" y2="145" class="arrow-red"/>
  <line x1="210" y1="165" x2="250" y2="185" class="arrow-red"/>
  <text x="295" y="88" font-size="10" fill="#991b1b" font-weight="600">Contents leak</text>
  
  <!-- Features -->
  <text x="185" y="195" font-size="11" fill="#991b1b" font-weight="600" text-anchor="middle">Features:</text>
  <text x="185" y="215" font-size="10" fill="#7f1d1d" text-anchor="middle">• Membrane ruptures early</text>
  <text x="185" y="233" font-size="10" fill="#7f1d1d" text-anchor="middle">• Triggers inflammation</text>
  <text x="185" y="251" font-size="10" fill="#7f1d1d" text-anchor="middle">• Affects groups of cells</text>
  <text x="185" y="269" font-size="10" fill="#7f1d1d" text-anchor="middle">• Nucleus fades (karyolysis)</text>
  <text x="185" y="302" font-size="10" fill="#991b1b" font-weight="700" text-anchor="middle">Examples: MI, stroke, burns</text>
  
  <!-- Right: APOPTOSIS -->
  <rect x="370" y="40" width="330" height="280" class="box2"/>
  <text x="535" y="70" class="hdr" fill="#059669">APOPTOSIS (Programmed)</text>
  
  <!-- Apoptosis cell -->
  <circle cx="535" cy="110" r="30" fill="#86efac" stroke="#059669" stroke-width="2"/>
  <text x="535" y="107" class="lbl" font-size="10" fill="#065f46">Shrink</text>
  <text x="535" y="121" class="lbl" font-size="10" fill="#065f46">(pyknosis)</text>
  
  <!-- Blebs -->
  <circle cx="505" cy="95" r="7" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
  <circle cx="560" cy="90" r="7" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
  <circle cx="565" cy="115" r="6" fill="#bbf7d0" stroke="#059669" stroke-width="1.5"/>
  <text x="495" y="80" font-size="9" fill="#065f46">Apoptotic bodies</text>
  
  <!-- Features -->
  <text x="535" y="165" font-size="11" fill="#065f46" font-weight="600" text-anchor="middle">Features:</text>
  <text x="535" y="185" font-size="10" fill="#064e3b" text-anchor="middle">• Membrane stays intact</text>
  <text x="535" y="203" font-size="10" fill="#064e3b" text-anchor="middle">• NO inflammation</text>
  <text x="535" y="221" font-size="10" fill="#064e3b" text-anchor="middle">• Single cells</text>
  <text x="535" y="239" font-size="10" fill="#064e3b" text-anchor="middle">• Nucleus fragments (karyorrhexis)</text>
  <text x="535" y="257" font-size="10" fill="#064e3b" text-anchor="middle">• ATP-dependent (active process)</text>
  <text x="535" y="302" font-size="10" fill="#065f46" font-weight="700" text-anchor="middle">Examples: Embryogenesis, viral hepatitis,</text>
  <text x="535" y="316" font-size="10" fill="#065f46" font-weight="700" text-anchor="middle">Councilman bodies, physiologic turnover</text>
  
  <!-- Key discriminator -->
  <rect x="150" y="320" width="420" height="0" fill="none"/>
</svg>
